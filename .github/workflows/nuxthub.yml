name: Deploy to NuxtHub
on: push

jobs:
  deploy:
    name: "Deploy to NuxtHub"
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref == 'refs/heads/main' && 'production' || 'preview' }}
      url: ${{ steps.deploy.outputs.deployment-url }}
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Ensure NuxtHub module is installed
        run: bunx nuxthub@latest ensure

      - name: Build application
        run: node --max-old-space-size=8192 node_modules/.bin/nuxt build
        env:
          APP_URL: ${{ vars.APP_URL }}
          NUXT_UI_PRO_LICENSE: ${{ secrets.NUXT_UI_PRO_LICENSE }}
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          SUPABASE_KEY: ${{ vars.SUPABASE_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          STRIPE_PUBLIC_KEY: ${{ vars.STRIPE_PUBLIC_KEY }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
          STRIPE_CUSTOM_AI_COACHING_ANNUAL_PRICE: ${{ vars.STRIPE_CUSTOM_AI_COACHING_ANNUAL_PRICE }}
          STRIPE_CUSTOM_AI_COACHING_MONTHLY_PRICE: ${{ vars.STRIPE_CUSTOM_AI_COACHING_MONTHLY_PRICE }}
          STRIPE_CUSTOM_AI_COACHING_TRIMESTRIAL_PRICE: ${{ vars.STRIPE_CUSTOM_AI_COACHING_TRIMESTRIAL_PRICE }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          EXASEARCH_API_KEY: ${{ secrets.EXASEARCH_API_KEY }}
          NUXT_HUB_PROJECT_KEY: ${{ vars.NUXT_HUB_PROJECT_KEY }}
          NUXT_HUB_ENV: ${{ vars.NUXT_HUB_ENV }}

      - name: Deploy to NuxtHub
        uses: nuxt-hub/action@v1
        id: deploy
        with:
          project-key: kipoui-xmgd
