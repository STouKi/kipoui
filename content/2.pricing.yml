title: Des formules pour chaque besoin

description: Choisissez l'accompagnement qui vous convient le mieux. Que vous ayez besoin d'un simple coup de pouce ou d'un suivi approfondi, Kipoui s'adapte à vous.

seo:
  title: Tarifs - Kipoui
  description: Comparez nos formules d'accompagnement nutritionnel et motivationnel personnalisé.

navigation.icon: i-lucide-credit-card

plans:
  - title: Découverte
    description: Pour commencer en douceur avec un coach personnalisé.
    price:
      month: 9.9 €
      year: 99 €
    button:
      label: Commencer
      color: neutral
      variant: subtle
    features:
      - Assistant nutrition 24/7
      - Plan repas hebdomadaire personnalisé
      - Conseils motivation
      - Accès au chat de base
      - Espace personnel

  - title: Essentiel
    description: L'équilibre entre accompagnement et autonomie.
    price:
      month: 19.9 €
      year: 199 €
    highlight: true
    scale: true
    button:
      label: Choisir
    features:
      - Tout du plan Découverte
      - Suivi hebdomadaire adapté
      - Objectifs personnalisés
      - Rappels et motivation
      - Recettes adaptées

  - title: Premium
    description: Un suivi complet avec accompagnement renforcé.
    price:
      month: 29.9 €
      year: 299 €
    button:
      label: S'abonner
      color: neutral
      variant: subtle
    features:
      - Tout du plan Essentiel
      - Bilan mensuel avec coach
      - Accès prioritaire
      - Analyse de progression
      - Conseils personnalisés évolutifs

faq:
  title: Questions fréquentes
  description: Voici les réponses aux questions les plus courantes sur l'accompagnement Kipoui.
  items:
    - label: Est-ce que le service est sécurisé ?
      content: Oui, toutes vos données personnelles sont stockées de manière sécurisée et conforme au RGPD.
      defaultOpen: true
    - label: Puis-je annuler mon abonnement à tout moment ?
      content: Bien sûr. Vous pouvez gérer votre abonnement depuis votre espace personnel.
    - label: Comment fonctionne l'essai gratuit ?
      content: Nous proposons un premier contact et un chatbot démo pour tester l'expérience.
    - label: Puis-je changer de formule plus tard ?
      content: Oui, vous pouvez passer à un plan supérieur ou inférieur selon vos besoins.
    - label: Proposez-vous des remboursements ?
      content: Nous remboursons au prorata en cas de problème technique ou de demande justifiée.
    - label: Est-ce que j'ai accès à un vrai coach ?
      content: Oui, selon la formule choisie, un coach humain peut compléter votre accompagnement IA.
