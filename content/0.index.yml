title: Bienvenue sur Kipoui
description: Kipoui est votre coach nutrition 100% personnalisé, disponible 24h/24. Créez un lien unique avec votre alimentation, retrouvez énergie, équilibre et motivation.
seo:
  title: Kipoui - Votre coach nutrition personnalisé
  description: Une application bienveillante qui combine nutrition, motivation et intelligence artificielle pour un accompagnement sur mesure.
navigation: false
hero:
  links:
    - label: Démarrer maintenant
      icon: i-lucide-arrow-right
      trailing: true
      to: /inscription
      size: xl
    - label: En savoir plus
      icon: i-lucide-info
      size: xl
      color: neutral
      variant: subtle
      to: /a-propos
sections:
  - title: Un coach qui vous comprend
    description: "Kipoui n'est pas une simple appli : c'est un véritable compagnon de route. Avec un profil personnalisé et un chatbot à votre écoute, vous êtes accompagné de façon unique, bienveillante et motivante."
    orientation: horizontal
    image: professional-card
    features:
      - name: 100% Personnalisé
        description: Votre accompagnement s'adapte à votre mode de vie, vos objectifs, vos contraintes (régime, allergies, etc).
        icon: i-lucide-user
      - name: Disponible 24/7
        description: Un assistant toujours présent, même quand la motivation baisse ou que les questions surgissent.
        icon: i-lucide-clock
      - name: Motivation & bien-être
        description: Des messages positifs, des rappels doux, et un soutien mental tout au long du parcours.
        icon: i-lucide-heart
  - title: Pensé pour votre transformation
    description: "Notre mission : vous aider à retrouver la confiance, à mieux manger et à rester motivé sans pression ni dogmes."
    orientation: horizontal
    reverse: true
    image: nature-benefits
    features:
      - name: Suivi intelligent
        description: Un historique et des recommandations adaptées à vos évolutions.
        icon: i-lucide-activity
      - name: Flexible
        description: Accessible via mobile, tablette ou ordi, sans installation.
        icon: i-lucide-tablet-smartphone
      - name: Sans jugement
        description: Vous avancez à votre rythme, avec bienveillance et sérénité.
        icon: i-lucide-leaf
features:
  title: Ce que Kipoui vous apporte
  description: Bien plus qu'une app, Kipoui vous offre un cadre sécurisant et motivant pour changer durablement.
  items:
    - title: Approche holistique
      description: "Nutrition, motivation, écoute : tout est pris en compte pour un changement profond."
      icon: i-lucide-heart
    - title: Accès instantané
      description: "Connectez-vous et discutez avec votre assistant sans attendre."
      icon: i-lucide-zap
    - title: Données protégées
      description: Vos infos personnelles sont stockées de façon sécurisée, conformément au RGPD.
      icon: i-lucide-lock
    - title: Support humain
      description: Vous pouvez échanger avec un coach réel pour compléter l'accompagnement IA.
      icon: i-lucide-users
    - title: Interface claire
      description: Une navigation simple et agréable, pensée pour le confort quotidien.
      icon: i-lucide-layout-dashboard
    - title: Tarif doux
      description: Des formules accessibles, sans engagement ni frais cachés.
      icon: i-lucide-circle-dollar-sign
testimonials:
  headline: Ils ont testé Kipoui
  title: Des utilisateurs conquis
  description: Voici ce que disent les premières personnes accompagnées par Kipoui.
  items:
    - quote: J'avais perdu confiance après plusieurs régimes. Kipoui m'a redonné un cadre motivant et bienveillant, sans pression.
      user:
        name: Aline M.
        description: 42 ans, Toulouse
        avatar:
          src: https://i.pravatar.cc/120?img=30
    - quote: J'aime pouvoir discuter avec mon coach perso quand je veux. Les conseils sont adaptés à moi, pas génériques.
      user:
        name: Julien T.
        description: 37 ans, Marseille
        avatar:
          src: https://i.pravatar.cc/120?img=35
    - quote: En quelques semaines, j'ai retrouvé l'énergie, le plaisir de manger, et j'ai perdu 3 kg sans m'en rendre compte.
      user:
        name: Fatou D.
        description: 29 ans, Bordeaux
        avatar:
          src: https://i.pravatar.cc/120?img=45
cta:
  title: Lancez votre accompagnement Kipoui maintenant !
  description: Profitez d'un premier contact gratuit et d'un assistant personnalisé créé pour vous.
  links:
    - label: Créer mon profil
      to: /inscription
      icon: i-lucide-user-plus
    - label: En savoir plus
      to: /a-propos
      trailingIcon: i-lucide-circle-help
      variant: subtle
